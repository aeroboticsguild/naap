<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel · AeroBotics Guild</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
    
    <style>
        /* Admin Panel Styles */
        .admin-panel {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--white);
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-lg);
        }
        
        .admin-panel h2 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        
        .admin-panel .subtitle {
            color: var(--gray-500);
            margin-bottom: 2rem;
        }
        
        .admin-panel .form-group {
            margin-bottom: 1.2rem;
        }
        
        .admin-panel label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: var(--primary);
        }
        
        .admin-panel input,
        .admin-panel select,
        .admin-panel textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 1rem;
            transition: var(--transition);
            font-family: inherit;
        }
        
        .admin-panel input:focus,
        .admin-panel select:focus,
        .admin-panel textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(182, 139, 64, 0.1);
        }
        
        .admin-panel .btn {
            width: 100%;
            justify-content: center;
            padding: 1rem;
        }
        
        .admin-panel .btn-small {
            width: auto;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
        }
        
        .admin-panel .btn-secondary {
            background: var(--gray-200);
            color: var(--gray-700);
        }
        
        .admin-panel .btn-secondary:hover {
            background: var(--gray-300);
        }
        
        .admin-panel .btn-danger {
            background: #dc3545;
            color: var(--white);
        }
        
        .admin-panel .btn-danger:hover {
            background: #c82333;
        }
        
        .admin-panel .btn-success {
            background: #28a745;
            color: var(--white);
        }
        
        .admin-panel .btn-success:hover {
            background: #218838;
        }
        
        .admin-panel .success {
            display: none;
            background: #d4edda;
            color: #155724;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            border: 1px solid #c3e6cb;
        }
        
        .admin-panel .success.show {
            display: block;
        }
        
        .admin-panel .error {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            border: 1px solid #f5c6cb;
        }
        
        .admin-panel .error.show {
            display: block;
        }
        
        .admin-panel .admin-info {
            background: var(--gray-50);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .admin-panel .admin-info span {
            color: var(--gray-600);
        }
        
        .admin-panel .admin-info .badge-admin {
            background: var(--gold);
            color: var(--white);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .admin-panel .logout-btn {
            color: var(--gray-500);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            cursor: pointer;
            background: none;
            border: none;
        }
        
        .admin-panel .logout-btn:hover {
            color: #721c24;
        }
        
        .admin-panel .member-list {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--gray-200);
        }
        
        .admin-panel .member-list h3 {
            color: var(--primary);
            margin-bottom: 1rem;
        }
        
        .admin-panel .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: var(--gray-50);
            border-radius: 8px;
            margin-bottom: 0.5rem;
            border: 1px solid var(--gray-200);
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .admin-panel .member-item .member-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .admin-panel .member-item .member-name {
            font-weight: 600;
            color: var(--primary);
        }
        
        .admin-panel .member-item .member-email {
            font-size: 0.85rem;
            color: var(--gray-500);
        }
        
        .admin-panel .member-item .member-rank {
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            background: var(--gold);
            color: var(--white);
            font-size: 0.7rem;
            font-weight: 700;
        }
        
        .admin-panel .member-item .member-points {
            font-size: 0.85rem;
            color: var(--gray-600);
            font-weight: 600;
        }
        
        .admin-panel .member-item .member-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .admin-panel .member-item .action-btn {
            padding: 0.3rem 0.7rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: var(--transition);
        }
        
        .admin-panel .member-item .edit-btn {
            background: var(--gold);
            color: var(--white);
        }
        
        .admin-panel .member-item .edit-btn:hover {
            background: var(--gold-dark);
        }
        
        .admin-panel .member-item .delete-btn {
            background: #f8d7da;
            color: #721c24;
        }
        
        .admin-panel .member-item .delete-btn:hover {
            background: #f5c6cb;
        }
        
        .admin-panel .member-item .view-btn {
            background: #cce5ff;
            color: #004085;
        }
        
        .admin-panel .member-item .view-btn:hover {
            background: #b8d4f0;
        }
        
        /* ===== EDIT MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-content {
            background: var(--white);
            padding: 2.5rem;
            border-radius: var(--radius);
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            position: relative;
        }
        
        .modal-content h3 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        
        .modal-content .modal-subtitle {
            color: var(--gray-500);
            margin-bottom: 1.5rem;
        }
        
        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        
        .modal-actions .btn {
            flex: 1;
            min-width: 120px;
        }
        
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 1.5rem;
            color: var(--gray-400);
            cursor: pointer;
            transition: var(--transition);
            background: none;
            border: none;
        }
        
        .modal-close:hover {
            color: var(--gray-800);
        }
        
        .list-input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        
        .list-input-group input {
            flex: 1;
        }
        
        .list-input-group .btn-small {
            width: auto;
            white-space: nowrap;
        }
        
        .list-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }
        
        .list-item-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--gray-200);
            padding: 0.3rem 0.8rem;
            border-radius: 30px;
            font-size: 0.85rem;
            color: var(--primary);
        }
        
        .list-item-tag .remove-item {
            cursor: pointer;
            color: #721c24;
            font-weight: 700;
        }
        
        .list-item-tag .remove-item:hover {
            color: #dc3545;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        /* Rank colors */
        .rank-F { background: #94a3b8; color: white; }
        .rank-D { background: #64748b; color: white; }
        .rank-C { background: #3b82f6; color: white; }
        .rank-B { background: #8b5cf6; color: white; }
        .rank-A { background: var(--gold); color: white; }
        
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 1.5rem;
            }
            .member-item .member-info {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-panel" id="adminPanel">
            <h2><i class="fas fa-user-shield" style="color: var(--gold);"></i> Admin Panel</h2>
            <p class="subtitle">Full Member Management for AeroBotics Guild</p>
            
            <!-- Admin Info -->
            <div class="admin-info" id="adminInfo" style="display:none;">
                <div>
                    <i class="fas fa-user-circle" style="color: var(--gold); font-size: 1.5rem;"></i>
                    <span id="adminName">Admin</span>
                    <span class="badge-admin">Admin</span>
                </div>
                <button onclick="logoutAdmin()" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>

            <!-- Login Form -->
            <div id="loginSection">
                <form id="adminLoginForm" class="auth-form">
                    <div class="form-group">
                        <label for="adminEmail"><i class="fas fa-envelope"></i> Admin Email</label>
                        <input type="email" id="adminEmail" placeholder="Enter admin email" required />
                    </div>
                    <div class="form-group">
                        <label for="adminPassword"><i class="fas fa-lock"></i> Admin Password</label>
                        <input type="password" id="adminPassword" placeholder="Enter admin password" required />
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    <div id="loginError" class="error"></div>
                </form>
            </div>

            <!-- Admin Actions -->
            <div id="adminActions" style="display:none;">
                <!-- Add Member Form -->
                <form id="adminAddMemberForm" class="auth-form">
                    <h3><i class="fas fa-user-plus" style="color: var(--gold);"></i> Add New Member</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="memberName"><i class="fas fa-user"></i> Full Name</label>
                            <input type="text" id="memberName" placeholder="e.g., Juan Dela Cruz" required />
                        </div>
                        <div class="form-group">
                            <label for="memberEmail"><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" id="memberEmail" placeholder="e.g., juan@email.com" required />
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="memberPassword"><i class="fas fa-lock"></i> Temporary Password</label>
                        <input type="text" id="memberPassword" placeholder="e.g., Temp123!" required />
                        <small style="color: var(--gray-500); font-size: 0.8rem;">Member will change this on first login</small>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="memberRank"><i class="fas fa-star"></i> Initial Rank</label>
                            <select id="memberRank" required>
                                <option value="F">F - Entry Level</option>
                                <option value="D">D - Developing</option>
                                <option value="C">C - Contributing</option>
                                <option value="B">B - Advanced</option>
                                <option value="A">A - Elite</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="memberPoints"><i class="fas fa-coins"></i> Initial Points</label>
                            <input type="number" id="memberPoints" value="0" min="0" />
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="memberTrack"><i class="fas fa-robot"></i> Track</label>
                        <select id="memberTrack">
                            <option value="Systems & Fabrication">Systems & Fabrication</option>
                            <option value="Software & Programming">Software & Programming</option>
                            <option value="Research & Development">Research & Development</option>
                            <option value="Multidisciplinary">Multidisciplinary</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-user-plus"></i> Create Member Account
                    </button>
                    <div id="adminMessage" class="success"></div>
                    <div id="adminError" class="error"></div>
                </form>

                <!-- Member List -->
                <div class="member-list" id="memberList">
                    <h3><i class="fas fa-users"></i> Current Members</h3>
                    <div id="membersContainer">
                        <p style="color: var(--gray-500);">Loading members...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== EDIT MEMBER MODAL (FULL) ===== -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeEditModal()">&times;</button>
            <h3><i class="fas fa-edit" style="color: var(--gold);"></i> Edit Member</h3>
            <p class="modal-subtitle" id="editMemberNameDisplay">Update all member details</p>
            
            <form id="editMemberForm" class="auth-form">
                <input type="hidden" id="editMemberId" />
                
                <!-- Basic Info -->
                <h4 style="color: var(--primary); margin-top: 0.5rem;">Basic Information</h4>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editName"><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="editName" required />
                    </div>
                    <div class="form-group">
                        <label for="editEmail"><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="editEmail" required />
                    </div>
                </div>
                
                <!-- Rank & Points -->
                <h4 style="color: var(--primary); margin-top: 0.5rem;">Progress & Ranking</h4>
                <div class="form-row">
                    <div class="form-group">
                        <label for="editRank"><i class="fas fa-star"></i> Rank</label>
                        <select id="editRank" required>
                            <option value="F">F - Entry Level</option>
                            <option value="D">D - Developing</option>
                            <option value="C">C - Contributing</option>
                            <option value="B">B - Advanced</option>
                            <option value="A">A - Elite</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editPoints"><i class="fas fa-coins"></i> Points</label>
                        <input type="number" id="editPoints" min="0" required />
                    </div>
                </div>
                
                <!-- Track -->
                <div class="form-group">
                    <label for="editTrack"><i class="fas fa-robot"></i> Track</label>
                    <select id="editTrack">
                        <option value="Systems & Fabrication">Systems & Fabrication</option>
                        <option value="Software & Programming">Software & Programming</option>
                        <option value="Research & Development">Research & Development</option>
                        <option value="Multidisciplinary">Multidisciplinary</option>
                    </select>
                </div>
                
                <!-- Modules -->
                <h4 style="color: var(--primary); margin-top: 0.5rem;">
                    <i class="fas fa-certificate"></i> Modules Completed
                </h4>
                <div class="list-input-group">
                    <input type="text" id="moduleInput" placeholder="Enter module name" />
                    <button type="button" class="btn btn-small btn-success" onclick="addModuleToList()">
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>
                <div class="list-items" id="modulesList"></div>
                
                <!-- Projects -->
                <h4 style="color: var(--primary); margin-top: 0.5rem;">
                    <i class="fas fa-project-diagram"></i> Projects Joined
                </h4>
                <div class="list-input-group">
                    <input type="text" id="projectInput" placeholder="Enter project name" />
                    <button type="button" class="btn btn-small btn-success" onclick="addProjectToList()">
                        <i class="fas fa-plus"></i> Add
                    </button>
                </div>
                <div class="list-items" id="projectsList"></div>
                
                <!-- Join Date -->
                <div class="form-group">
                    <label for="editJoinDate"><i class="fas fa-calendar"></i> Join Date</label>
                    <input type="datetime-local" id="editJoinDate" />
                </div>
                
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save All Changes
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">
                        Cancel
                    </button>
                </div>
                <div id="editMessage" class="success"></div>
                <div id="editError" class="error"></div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // ===== FIREBASE CONFIG =====
        const firebaseConfig = {
            apiKey: "AIzaSyB00V6hNLRbUsg8tnSoUksBZbARIbNhsGI",
  authDomain: "aerobotics-guild.firebaseapp.com",
  projectId: "aerobotics-guild",
  storageBucket: "aerobotics-guild.firebasestorage.app",
  messagingSenderId: "797399215588",
  appId: "1:797399215588:web:f0fb7952501bd57c94abf1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ===== GLOBAL VARIABLES FOR EDIT =====
        let editModules = [];
        let editProjects = [];

        // ===== CHECK ADMIN STATUS =====
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                try {
                    const adminDoc = await db.collection('admins').doc(user.uid).get();
                    if (adminDoc.exists) {
                        document.getElementById('loginSection').style.display = 'none';
                        document.getElementById('adminActions').style.display = 'block';
                        document.getElementById('adminInfo').style.display = 'flex';
                        document.getElementById('adminName').textContent = adminDoc.data().name || 'Admin';
                        loadMembers();
                    } else {
                        document.getElementById('loginSection').style.display = 'block';
                        document.getElementById('adminActions').style.display = 'none';
                        document.getElementById('adminInfo').style.display = 'none';
                        document.getElementById('loginError').textContent = '❌ You are not authorized as admin.';
                        document.getElementById('loginError').className = 'error show';
                        auth.signOut();
                    }
                } catch (error) {
                    console.error('Error checking admin status:', error);
                }
            } else {
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('adminActions').style.display = 'none';
                document.getElementById('adminInfo').style.display = 'none';
            }
        });

        // ===== ADMIN LOGIN =====
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            try {
                errorDiv.className = 'error';
                errorDiv.textContent = '⏳ Logging in...';
                await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                errorDiv.textContent = '❌ ' + error.message;
                errorDiv.className = 'error show';
            }
        });

        // ===== ADMIN LOGOUT =====
        function logoutAdmin() {
            auth.signOut();
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminActions').style.display = 'none';
            document.getElementById('adminInfo').style.display = 'none';
            document.getElementById('adminEmail').value = '';
            document.getElementById('adminPassword').value = '';
        }

        // ===== ADD MEMBER =====
        document.getElementById('adminAddMemberForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('memberName').value.trim();
            const email = document.getElementById('memberEmail').value.trim();
            const password = document.getElementById('memberPassword').value;
            const rank = document.getElementById('memberRank').value;
            const points = parseInt(document.getElementById('memberPoints').value) || 0;
            const track = document.getElementById('memberTrack').value;
            
            const successDiv = document.getElementById('adminMessage');
            const errorDiv = document.getElementById('adminError');
            
            if (!name || !email || !password) {
                errorDiv.textContent = '❌ Please fill in all required fields.';
                errorDiv.className = 'error show';
                successDiv.className = 'success';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = '❌ Password must be at least 6 characters.';
                errorDiv.className = 'error show';
                successDiv.className = 'success';
                return;
            }
            
            try {
                successDiv.className = 'success';
                successDiv.textContent = '⏳ Creating account...';
                errorDiv.className = 'error';
                
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                await user.updateProfile({ displayName: name });
                
                await db.collection('members').doc(user.uid).set({
                    name: name,
                    email: email,
                    rank: rank,
                    points: points,
                    tracks: [track],
                    modules: [],
                    projects: [],
                    joinDate: new Date().toISOString(),
                    role: 'student'
                });
                
                document.getElementById('memberName').value = '';
                document.getElementById('memberEmail').value = '';
                document.getElementById('memberPassword').value = '';
                document.getElementById('memberPoints').value = '0';
                
                successDiv.textContent = '✅ Member ' + name + ' created successfully!';
                successDiv.className = 'success show';
                errorDiv.className = 'error';
                
                loadMembers();
                
                setTimeout(() => {
                    successDiv.className = 'success';
                }, 5000);
                
            } catch (error) {
                errorDiv.textContent = '❌ ' + error.message;
                errorDiv.className = 'error show';
                successDiv.className = 'success';
            }
        });

       // ===== LOAD MEMBERS =====
async function loadMembers() {
    const container = document.getElementById('membersContainer');
    if (!container) return;
    container.innerHTML = '<p style="color: var(--gray-500);">Loading members...</p>';
    
    try {
        const snapshot = await db.collection('members').orderBy('name').get();
        if (snapshot.empty) {
            container.innerHTML = '<p style="color: var(--gray-500);">No members yet. Add your first member!</p>';
            return;
        }
        
        let html = '';
        snapshot.forEach(doc => {
            const data = doc.data();
            console.log('📝 Member data:', data); // DEBUG
            
            // Safely get values with proper fallbacks
            const name = data?.name || 'No Name';
            const email = data?.email || 'No Email';
            const rank = data?.rank || 'F';
            const points = typeof data?.points === 'number' ? data.points : 0;
            const modules = Array.isArray(data?.modules) ? data.modules.length : 0;
            const rankClass = 'rank-' + rank;
            
            html += `
                <div class="member-item">
                    <div class="member-info">
                        <span class="member-name">${name}</span>
                        <span class="member-email">${email}</span>

                        <span style="font-size:0.7rem; color:var(--gray-500);">
                            ${modules} modules
                        </span>

        // ===== OPEN EDIT MODAL (FULL) =====
async function openEditModal(uid) {
    try {
        const doc = await db.collection('members').doc(uid).get();
        if (!doc.exists) {
            alert('Member not found!');
            return;
        }
        
        const data = doc.data();
        console.log('📝 Editing member data:', data); // DEBUG
        
        // Set basic info with proper fallbacks
        document.getElementById('editMemberId').value = uid;
        document.getElementById('editMemberNameDisplay').textContent = 'Editing: ' + (data.name || 'Member');
        document.getElementById('editName').value = data.name || '';
        document.getElementById('editEmail').value = data.email || '';
        document.getElementById('editRank').value = data.rank || 'F';
        document.getElementById('editPoints').value = data.points || 0;
        
        // FIXED: Better track handling
        const track = (data.tracks && data.tracks.length > 0) ? data.tracks[0] : 'Systems & Fabrication';
        document.getElementById('editTrack').value = track;
        
        // Set join date
        if (data.joinDate) {
            try {
                const date = new Date(data.joinDate);
                if (!isNaN(date.getTime())) {
                    document.getElementById('editJoinDate').value = date.toISOString().slice(0, 16);
                } else {
                    document.getElementById('editJoinDate').value = '';
                }
            } catch (e) {
                document.getElementById('editJoinDate').value = '';
            }
        } else {
            document.getElementById('editJoinDate').value = '';
        }
        
        // Set modules - FIXED: ensure it's an array
        editModules = Array.isArray(data.modules) ? [...data.modules] : [];
        renderModulesList();
        
        // Set projects - FIXED: ensure it's an array
        editProjects = Array.isArray(data.projects) ? [...data.projects] : [];
        renderProjectsList();
        
        // Clear messages
        document.getElementById('editMessage').className = 'success';
        document.getElementById('editError').className = 'error';
        document.getElementById('editMessage').textContent = '';
        document.getElementById('editError').textContent = '';
        
        // Show modal
        document.getElementById('editModal').classList.add('show');
        
    } catch (error) {
        console.error('Error loading member data:', error);
        alert('Error loading member data: ' + error.message);
    }
}
        // ===== CLOSE EDIT MODAL =====
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            document.getElementById('editMemberId').value = '';
            editModules = [];
            editProjects = [];
        }

        // ===== MODULE LIST FUNCTIONS =====
        function addModuleToList() {
            const input = document.getElementById('moduleInput');
            const value = input.value.trim();
            if (value && !editModules.includes(value)) {
                editModules.push(value);
                renderModulesList();
                input.value = '';
            } else if (editModules.includes(value)) {
                alert('Module already added!');
            }
        }

        function removeModuleFromList(index) {
            editModules.splice(index, 1);
            renderModulesList();
        }

        function renderModulesList() {
            const container = document.getElementById('modulesList');
            if (editModules.length === 0) {
                container.innerHTML = '<span style="color: var(--gray-400); font-size: 0.85rem;">No modules added yet</span>';
                return;
            }
            container.innerHTML = editModules.map((module, index) => `
                <span class="list-item-tag">
                    ${module}
                    <span class="remove-item" onclick="removeModuleFromList(${index})">&times;</span>
                </span>
            `).join('');
        }

        // ===== PROJECT LIST FUNCTIONS =====
        function addProjectToList() {
            const input = document.getElementById('projectInput');
            const value = input.value.trim();
            if (value && !editProjects.includes(value)) {
                editProjects.push(value);
                renderProjectsList();
                input.value = '';
            } else if (editProjects.includes(value)) {
                alert('Project already added!');
            }
        }

        function removeProjectFromList(index) {
            editProjects.splice(index, 1);
            renderProjectsList();
        }

        function renderProjectsList() {
            const container = document.getElementById('projectsList');
            if (editProjects.length === 0) {
                container.innerHTML = '<span style="color: var(--gray-400); font-size: 0.85rem;">No projects added yet</span>';
                return;
            }
            container.innerHTML = editProjects.map((project, index) => `
                <span class="list-item-tag">
                    ${project}
                    <span class="remove-item" onclick="removeProjectFromList(${index})">&times;</span>
                </span>
            `).join('');
        }

        // ===== SAVE EDITED MEMBER =====
document.getElementById('editMemberForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const uid = document.getElementById('editMemberId').value;
    const name = document.getElementById('editName').value.trim();
    const email = document.getElementById('editEmail').value.trim();
    const rank = document.getElementById('editRank').value;
    const points = parseInt(document.getElementById('editPoints').value) || 0;
    const track = document.getElementById('editTrack').value;
    const joinDate = document.getElementById('editJoinDate').value;
    
    const successDiv = document.getElementById('editMessage');
    const errorDiv = document.getElementById('editError');
    
    if (!name || !email) {
        errorDiv.textContent = '❌ Name and Email are required.';
        errorDiv.className = 'error show';
        successDiv.className = 'success';
        return;
    }
    
    try {
        successDiv.className = 'success';
        successDiv.textContent = '⏳ Saving changes...';
        errorDiv.className = 'error';
        
        // Prepare update data - FIXED: better structure
        const updateData = {
            name: name,
            email: email,
            rank: rank,
            points: points,
            tracks: [track],
            modules: editModules || [],
            projects: editProjects || []
        };
        
        // Add join date if provided and valid
        if (joinDate) {
            try {
                const date = new Date(joinDate);
                if (!isNaN(date.getTime())) {
                    updateData.joinDate = date.toISOString();
                }
            } catch (e) {
                console.warn('Invalid date format, skipping joinDate');
            }
        }
        
        console.log('📝 Updating member with data:', updateData); // DEBUG
        
        // Update in Firestore
        await db.collection('members').doc(uid).update(updateData);
        
        successDiv.textContent = '✅ All changes saved successfully!';
        successDiv.className = 'success show';
        errorDiv.className = 'error';
        
        // Reload member list
        loadMembers();
        
        setTimeout(() => {
            closeEditModal();
        }, 1500);
        
    } catch (error) {
        console.error('Error saving member:', error);
        errorDiv.textContent = '❌ ' + error.message;
        errorDiv.className = 'error show';
        successDiv.className = 'success';
    }
});

        // ===== DELETE MEMBER =====
        async function deleteMember(uid) {
            if (confirm('⚠️ Are you sure you want to delete this member?\n\nThis will remove them from the database.\n(Their auth account will remain in Firebase Console)')) {
                try {
                    await db.collection('members').doc(uid).delete();
                    alert('✅ Member removed from database.');
                    loadMembers();
                } catch (error) {
                    alert('❌ Error deleting member: ' + error.message);
                }
            }
        }

        // ===== LOAD MEMBERS with better error handling =====
async function loadMembers() {
    const container = document.getElementById('membersContainer');
    container.innerHTML = '<p style="color: var(--gray-500);">Loading members...</p>';
    
    try {
        const snapshot = await db.collection('members').orderBy('name').get();
        if (snapshot.empty) {
            container.innerHTML = '<p style="color: var(--gray-500);">No members yet. Add your first member!</p>';
            return;
        }
        
        let html = '';
        snapshot.forEach(doc => {
            const data = doc.data();
            // FIXED: Better fallbacks for all fields
            const name = data.name || 'No Name';
            const email = data.email || 'No Email';
            const rank = data.rank || 'F';
            const points = data.points !== undefined ? data.points : 0;
            const modules = Array.isArray(data.modules) ? data.modules.length : 0;
            const rankClass = 'rank-' + rank;
            
            html += `
                <div class="member-item">
                    <div class="member-info">
                        <span class="member-name">${name}</span>
                        <span class="member-email">${email}</span>
                        <span class="member-rank ${rankClass}">${rank}</span>
                        <span class="member-points">${points} pts</span>
                        <span style="font-size:0.7rem; color:var(--gray-500);">
                            ${modules} modules
                        </span>
                    </div>
                    <div class="member-actions">
                        <button class="action-btn edit-btn" onclick="openEditModal('${doc.id}')">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="action-btn delete-btn" onclick="deleteMember('${doc.id}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
        
    } catch (error) {
        console.error('Error loading members:', error);
        container.innerHTML = '<p style="color: #721c24;">Error loading members: ' + error.message + '</p>';
    }
}
